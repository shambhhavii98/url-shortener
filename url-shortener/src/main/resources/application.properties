spring.application.name=url-shortener

# ---- H2 In-Memory Database (Replaced PostgreSQL) ----
spring.datasource.url=jdbc:h2:mem:urlshortenerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Web Console so you can see your data tables in a browser later
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- App Settings ----
# Used when building the full short URL, e.g. http://localhost:8080/aZ3xQ1p
app.base-url=http://localhost:8081
server.port=8081

spring.mvc.static-path-pattern=/static/**