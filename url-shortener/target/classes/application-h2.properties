# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=h2
# Great for a beginner's first run: no database installation needed at all.
# Data is stored in memory and disappears when the app stops.

spring.datasource.url=jdbc:h2:mem:urlshortener;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Optional web console to browse the in-memory database at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.base-url=http://localhost:8080
server.port=8080
